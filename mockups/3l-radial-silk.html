<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>3L: Silk Threads</title>
<style>*{margin:0;padding:0}body{background:#0a1219;overflow:hidden}canvas{display:block}
#label{position:fixed;top:20px;left:20px;color:#c8d8e0;font:600 18px Inter,system-ui;opacity:.7}
#desc{position:fixed;top:50px;left:20px;color:#c8d8e0;font:13px Inter,system-ui;opacity:.35;max-width:420px;line-height:1.5}
</style></head><body>
<div id="label">3L / Silk Threads</div>
<div id="desc">Dense edges with ultra-thin lines (0.3px) at slightly higher opacity. No glow on edges. The thinness + volume creates a silk-like weave. Gradient colors are more saturated. Nodes are small and bright.</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=window.innerWidth,H=window.innerHeight;
C.width=W*2;C.height=H*2;C.style.width=W+'px';C.style.height=H+'px';
X.scale(2,2);

const cx=W/2,cy=H/2;
const innerR=Math.min(W,H)*0.16;
const outerR=Math.min(W,H)*0.41;
const nodes=[];const edges=[];
const NG=80,NS=260;

for(let i=0;i<NG;i++){
  const angle=(i/NG)*Math.PI*2-Math.PI/2;
  const jitter=(Math.random()-0.5)*16;
  nodes.push({x:cx+Math.cos(angle)*(innerR+jitter),y:cy+Math.sin(angle)*(innerR+jitter),type:'goalie',r:1.2+Math.random()*2.5,count:10+Math.floor(Math.random()*200)});
}
for(let i=0;i<NS;i++){
  const angle=(i/NS)*Math.PI*2-Math.PI/2;
  const jitter=(Math.random()-0.5)*30;
  nodes.push({x:cx+Math.cos(angle)*(outerR+jitter),y:cy+Math.sin(angle)*(outerR+jitter),type:'scorer',r:0.7+Math.random()*2,count:5+Math.floor(Math.random()*150)});
}
for(let i=NG;i<NG+NS;i++){
  const numE=2+Math.floor(Math.random()*5);
  for(let j=0;j<numE;j++) edges.push([i,Math.floor(Math.random()*NG)]);
}
const maxDist=outerR*2;
const edgeDists=edges.map(([a,b])=>{const dx=nodes[a].x-nodes[b].x,dy=nodes[a].y-nodes[b].y;return Math.sqrt(dx*dx+dy*dy);});

function draw(){
  X.fillStyle='#0a1219';X.fillRect(0,0,W,H);

  // Ultra-thin silk threads
  X.lineWidth=0.3;
  for(let e=0;e<edges.length;e++){
    const[a,b]=edges[e];
    const na=nodes[a],nb=nodes[b];
    const closeness=1-Math.min(edgeDists[e]/maxDist,1);
    const alpha=0.08+closeness*0.22;

    const midX=(na.x+nb.x)/2,midY=(na.y+nb.y)/2;
    const cpx=midX+(cx-midX)*0.3,cpy=midY+(cy-midY)*0.3;

    const grad=X.createLinearGradient(na.x,na.y,nb.x,nb.y);
    // More saturated colors
    grad.addColorStop(0,`rgba(70,175,200,${alpha})`);
    grad.addColorStop(1,`rgba(235,145,80,${alpha})`);
    X.globalAlpha=1;X.strokeStyle=grad;
    X.beginPath();X.moveTo(na.x,na.y);X.quadraticCurveTo(cpx,cpy,nb.x,nb.y);X.stroke();
  }

  // Small bright nodes
  for(const n of nodes){
    const br=0.6+0.4*(n.count/200);
    // Tight glow
    const g=X.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3);
    const c=n.type==='scorer'?'70,175,200':'235,145,80';
    g.addColorStop(0,`rgba(${c},${br*0.3})`);g.addColorStop(1,`rgba(${c},0)`);
    X.globalAlpha=1;X.fillStyle=g;
    X.beginPath();X.arc(n.x,n.y,n.r*3,0,Math.PI*2);X.fill();

    X.globalAlpha=br;
    X.fillStyle=n.type==='scorer'?'#5ac0d8':'#e89050';
    X.beginPath();X.arc(n.x,n.y,n.r,0,Math.PI*2);X.fill();
  }
}
draw();
</script></body></html>
