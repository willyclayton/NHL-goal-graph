<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>3I: Frosted Glass</title>
<style>*{margin:0;padding:0}body{background:#0c1520;overflow:hidden}canvas{display:block}
#label{position:fixed;top:20px;left:20px;color:#c8d8e0;font:600 18px Inter,system-ui;opacity:.7}
#desc{position:fixed;top:50px;left:20px;color:#c8d8e0;font:13px Inter,system-ui;opacity:.35;max-width:420px;line-height:1.5}
</style></head><body>
<div id="label">3I / Frosted Glass</div>
<div id="desc">Gradient edges at moderate opacity layered over a frosted radial band between the two rings. The band creates a frosted-glass effect that gives the crossing edges a soft, icy look. Distance-based brightness.</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=window.innerWidth,H=window.innerHeight;
C.width=W*2;C.height=H*2;C.style.width=W+'px';C.style.height=H+'px';
X.scale(2,2);

const cx=W/2,cy=H/2;
const innerR=Math.min(W,H)*0.15;
const outerR=Math.min(W,H)*0.42;
const midR=(innerR+outerR)/2;
const bandW=(outerR-innerR);
const nodes=[];const edges=[];
const NG=65,NS=200;

for(let i=0;i<NG;i++){
  const angle=(i/NG)*Math.PI*2-Math.PI/2;
  const jitter=(Math.random()-0.5)*22;
  nodes.push({x:cx+Math.cos(angle)*(innerR+jitter),y:cy+Math.sin(angle)*(innerR+jitter),type:'goalie',r:1.8+Math.random()*3.5,count:10+Math.floor(Math.random()*200)});
}
for(let i=0;i<NS;i++){
  const angle=(i/NS)*Math.PI*2-Math.PI/2;
  const jitter=(Math.random()-0.5)*45;
  nodes.push({x:cx+Math.cos(angle)*(outerR+jitter),y:cy+Math.sin(angle)*(outerR+jitter),type:'scorer',r:1+Math.random()*3,count:5+Math.floor(Math.random()*150)});
}
for(let i=NG;i<NG+NS;i++){
  const numE=1+Math.floor(Math.random()*3);
  for(let j=0;j<numE;j++) edges.push([i,Math.floor(Math.random()*NG)]);
}
const maxDist=outerR*2;
const edgeDists=edges.map(([a,b])=>{const dx=nodes[a].x-nodes[b].x,dy=nodes[a].y-nodes[b].y;return Math.sqrt(dx*dx+dy*dy);});

function draw(){
  X.fillStyle='#0c1520';X.fillRect(0,0,W,H);

  // Frosted band between rings
  const frost=X.createRadialGradient(cx,cy,innerR-10,cx,cy,outerR+10);
  frost.addColorStop(0,'rgba(140,180,200,0)');
  frost.addColorStop(0.15,'rgba(140,180,200,0.02)');
  frost.addColorStop(0.4,'rgba(160,170,180,0.035)');
  frost.addColorStop(0.6,'rgba(160,170,180,0.035)');
  frost.addColorStop(0.85,'rgba(180,160,140,0.02)');
  frost.addColorStop(1,'rgba(180,160,140,0)');
  X.globalAlpha=1;X.fillStyle=frost;
  X.beginPath();X.arc(cx,cy,outerR+20,0,Math.PI*2);X.fill();

  // Ring outlines
  [innerR,outerR].forEach(r=>{
    X.globalAlpha=0.04;X.strokeStyle='#8ab8c8';X.lineWidth=0.8;
    X.beginPath();X.arc(cx,cy,r,0,Math.PI*2);X.stroke();
  });

  // Edges — gradient + distance opacity
  for(let e=0;e<edges.length;e++){
    const[a,b]=edges[e];
    const na=nodes[a],nb=nodes[b];
    const closeness=1-Math.min(edgeDists[e]/maxDist,1);
    const alpha=0.07+closeness*0.18;

    const midX=(na.x+nb.x)/2,midY=(na.y+nb.y)/2;
    const cpx=midX+(cx-midX)*0.3,cpy=midY+(cy-midY)*0.3;

    const grad=X.createLinearGradient(na.x,na.y,nb.x,nb.y);
    grad.addColorStop(0,`rgba(106,170,184,${alpha})`);
    grad.addColorStop(0.5,`rgba(180,175,170,${alpha*0.6})`);
    grad.addColorStop(1,`rgba(217,149,106,${alpha})`);
    X.globalAlpha=1;X.strokeStyle=grad;X.lineWidth=0.65;
    X.beginPath();X.moveTo(na.x,na.y);X.quadraticCurveTo(cpx,cpy,nb.x,nb.y);X.stroke();
  }

  // Nodes
  for(const n of nodes){
    const br=0.5+0.5*(n.count/200);
    const g=X.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*4);
    const c=n.type==='scorer'?'106,170,184':'217,149,106';
    g.addColorStop(0,`rgba(${c},${br*0.25})`);g.addColorStop(1,`rgba(${c},0)`);
    X.globalAlpha=1;X.fillStyle=g;
    X.beginPath();X.arc(n.x,n.y,n.r*4,0,Math.PI*2);X.fill();

    X.globalAlpha=br;
    X.fillStyle=n.type==='scorer'?'#6aaab8':'#d9956a';
    X.beginPath();X.arc(n.x,n.y,n.r,0,Math.PI*2);X.fill();

    if(n.r>2.2){
      X.globalAlpha=0.2;X.fillStyle='#ffffff';
      X.beginPath();X.arc(n.x-n.r*0.2,n.y-n.r*0.2,n.r*0.3,0,Math.PI*2);X.fill();
    }
  }
}
draw();
</script></body></html>
