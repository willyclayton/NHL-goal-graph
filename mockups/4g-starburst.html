<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>4G: Starburst</title>
<style>*{margin:0;padding:0}body{background:#090e16;overflow:hidden}canvas{display:block}
#label{position:fixed;top:20px;left:20px;color:#c8d8e0;font:600 18px Inter,system-ui;opacity:.7}
#desc{position:fixed;top:50px;left:20px;color:#c8d8e0;font:13px Inter,system-ui;opacity:.35;max-width:420px;line-height:1.5}
</style></head><body>
<div id="label">4G / Starburst</div>
<div id="desc">Edges only drawn from the top 15 highest-connected goalies (hubs). Each hub gets its own batch of edges, creating distinct starburst patterns. Very readable — you can see which goalies have the most connections.</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=window.innerWidth,H=window.innerHeight;
C.width=W*2;C.height=H*2;C.style.width=W+'px';C.style.height=H+'px';
X.scale(2,2);
const cx=W/2,cy=H/2,R=Math.min(W,H);
const innerR=R*0.18,outerR=R*0.43;
const PHI=0.618033988749895;
const NG=120,NS=350;
const nodes=[];const edges=[];
function spread(n){const o=[];for(let i=0;i<n;i++){let s=Math.round((i*n*PHI)%n);while(o[s]!==undefined)s=(s+1)%n;o[s]=i;}return o;}
const gOrder=spread(NG),sOrder=spread(NS);
for(let i=0;i<NG;i++){const ai=(gOrder[i]/NG)*Math.PI*2;const j=(Math.random()-.5)*12;nodes.push({x:cx+Math.cos(ai)*(innerR+j),y:cy+Math.sin(ai)*(innerR+j),type:'g',r:1.5+Math.random()*3.5,c:10+Math.floor(Math.random()*200)});}
for(let i=0;i<NS;i++){const ai=(sOrder[i]/NS)*Math.PI*2;const j=(Math.random()-.5)*18;nodes.push({x:cx+Math.cos(ai)*(outerR+j),y:cy+Math.sin(ai)*(outerR+j),type:'s',r:0.8+Math.random()*2.5,c:5+Math.floor(Math.random()*150)});}
for(let i=NG;i<NG+NS;i++){const ne=1+Math.floor(Math.random()*4);for(let j=0;j<ne;j++)edges.push([i,Math.floor(Math.random()*NG)]);}
// Find top 15 goalies by edge count
const goalieEdgeCounts=new Map();
for(const[a,b]of edges){goalieEdgeCounts.set(b,(goalieEdgeCounts.get(b)||0)+1);}
const topGoalies=new Set([...goalieEdgeCounts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,15).map(e=>e[0]));
const hubEdges=edges.filter(([a,b])=>topGoalies.has(b));
const otherEdges=edges.filter(([a,b])=>!topGoalies.has(b));
function draw(){
X.fillStyle='#090e16';X.fillRect(0,0,W,H);
// Faint background web for non-hub edges
X.globalAlpha=0.006;X.strokeStyle='#8abcd2';X.lineWidth=0.3;
X.beginPath();for(const[a,b]of otherEdges){X.moveTo(nodes[a].x,nodes[a].y);X.lineTo(nodes[b].x,nodes[b].y);}X.stroke();
// Hub starburst edges — brighter
X.globalAlpha=0.04;X.strokeStyle='#8abcd2';X.lineWidth=0.4;
X.beginPath();for(const[a,b]of hubEdges){X.moveTo(nodes[a].x,nodes[a].y);X.lineTo(nodes[b].x,nodes[b].y);}X.stroke();
for(const n of nodes){const br=0.5+0.5*Math.min(n.c/200,1);X.globalAlpha=br;X.fillStyle=n.type==='s'?'#5cc0d8':'#e89858';X.beginPath();X.arc(n.x,n.y,n.r,0,Math.PI*2);X.fill();}
}draw();
</script></body></html>
