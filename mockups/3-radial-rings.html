<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Mockup 3: Radial Rings</title>
<style>*{margin:0;padding:0}body{background:#0b1620;overflow:hidden}canvas{display:block}
#label{position:fixed;top:20px;left:20px;color:#c8d8e0;font:600 18px Inter,system-ui;opacity:.7}
#desc{position:fixed;top:50px;left:20px;color:#c8d8e0;font:13px Inter,system-ui;opacity:.35;max-width:400px;line-height:1.5}
</style></head><body>
<div id="label">3 / Radial Rings</div>
<div id="desc">Goalies in a tight inner ring, scorers in a wide outer ring. Concentric guide rings provide structure. Edges curve gracefully between rings using quadratic beziers. Higher-count players are larger and brighter.</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=window.innerWidth,H=window.innerHeight;
C.width=W*2;C.height=H*2;C.style.width=W+'px';C.style.height=H+'px';
X.scale(2,2);

const cx=W/2,cy=H/2;
const innerR=Math.min(W,H)*0.15;
const outerR=Math.min(W,H)*0.42;

const nodes=[];const edges=[];
const NG=60,NS=180;

// Goalies on inner ring
for(let i=0;i<NG;i++){
  const angle=(i/NG)*Math.PI*2-Math.PI/2;
  const jitter=(Math.random()-0.5)*20;
  nodes.push({
    x:cx+Math.cos(angle)*(innerR+jitter),
    y:cy+Math.sin(angle)*(innerR+jitter),
    type:'goalie',r:1.5+Math.random()*3,
    count:10+Math.floor(Math.random()*200)
  });
}
// Scorers on outer ring
for(let i=0;i<NS;i++){
  const angle=(i/NS)*Math.PI*2-Math.PI/2;
  const jitter=(Math.random()-0.5)*40;
  nodes.push({
    x:cx+Math.cos(angle)*(outerR+jitter),
    y:cy+Math.sin(angle)*(outerR+jitter),
    type:'scorer',r:1+Math.random()*3,
    count:5+Math.floor(Math.random()*150)
  });
}
// Edges
for(let i=NG;i<NG+NS;i++){
  const numE=1+Math.floor(Math.random()*3);
  for(let j=0;j<numE;j++){
    edges.push([i,Math.floor(Math.random()*NG)]);
  }
}

function draw(){
  X.fillStyle='#0b1620';X.fillRect(0,0,W,H);

  // Concentric guide rings
  for(let r=innerR-20;r<=outerR+40;r+=30){
    X.globalAlpha=0.02;X.strokeStyle='#6aaab8';X.lineWidth=0.5;
    X.beginPath();X.arc(cx,cy,r,0,Math.PI*2);X.stroke();
  }

  // Curved edges
  X.lineWidth=0.4;
  for(const[a,b]of edges){
    const na=nodes[a],nb=nodes[b];
    // Control point pulled toward center
    const midX=(na.x+nb.x)/2;
    const midY=(na.y+nb.y)/2;
    const toCenterX=cx-midX;
    const toCenterY=cy-midY;
    const cpx=midX+toCenterX*0.3;
    const cpy=midY+toCenterY*0.3;

    X.globalAlpha=0.035;
    X.strokeStyle='#ffffff';
    X.beginPath();
    X.moveTo(na.x,na.y);
    X.quadraticCurveTo(cpx,cpy,nb.x,nb.y);
    X.stroke();
  }

  // Nodes
  for(const n of nodes){
    const brightness=0.4+0.6*(n.count/200);
    // Glow
    const g=X.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*4);
    const c=n.type==='scorer'?'106,170,184':'217,149,106';
    g.addColorStop(0,`rgba(${c},${brightness*0.2})`);
    g.addColorStop(1,`rgba(${c},0)`);
    X.globalAlpha=1;X.fillStyle=g;
    X.beginPath();X.arc(n.x,n.y,n.r*4,0,Math.PI*2);X.fill();

    // Core
    X.globalAlpha=brightness;
    X.fillStyle=n.type==='scorer'?'#6aaab8':'#d9956a';
    X.beginPath();X.arc(n.x,n.y,n.r,0,Math.PI*2);X.fill();
  }

  // Ring labels
  X.globalAlpha=0.12;X.fillStyle='#c8d8e0';
  X.font='11px Inter,system-ui';X.textAlign='center';
  X.fillText('GOALIES',cx,cy-innerR+30);
  X.fillText('SCORERS',cx,cy-outerR+30);
}
draw();
</script></body></html>
