<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="puck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Puck shadow -->
  <ellipse cx="16" cy="22" rx="12" ry="5" fill="#000" opacity="0.3"/>
  <!-- Puck side -->
  <rect x="4" y="14" width="24" height="8" rx="0" fill="#1a1a1a"/>
  <ellipse cx="16" cy="22" rx="12" ry="5" fill="#222"/>
  <!-- Puck top -->
  <ellipse cx="16" cy="14" rx="12" ry="5" fill="url(#puck)"/>
  <!-- Puck line detail -->
  <ellipse cx="16" cy="14" rx="9" ry="3.5" fill="none" stroke="#555" stroke-width="0.5"/>
  <!-- Subtle highlight -->
  <ellipse cx="13" cy="12.5" rx="4" ry="1.5" fill="#fff" opacity="0.08"/>
</svg>
