<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>3M: Woven Glow</title>
<style>*{margin:0;padding:0}body{background:#090e16;overflow:hidden}canvas{display:block}
#label{position:fixed;top:20px;left:20px;color:#c8d8e0;font:600 18px Inter,system-ui;opacity:.7}
#desc{position:fixed;top:50px;left:20px;color:#c8d8e0;font:13px Inter,system-ui;opacity:.35;max-width:420px;line-height:1.5}
</style></head><body>
<div id="label">3M / Woven Glow</div>
<div id="desc">Dense tapestry with a single soft glow pass underneath the sharp gradient lines. The glow accumulates where edges overlap, creating bright hotspots in busy areas. Tight rings, saturated palette.</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=window.innerWidth,H=window.innerHeight;
C.width=W*2;C.height=H*2;C.style.width=W+'px';C.style.height=H+'px';
X.scale(2,2);

const cx=W/2,cy=H/2;
const innerR=Math.min(W,H)*0.17;
const outerR=Math.min(W,H)*0.40;
const nodes=[];const edges=[];
const NG=80,NS=250;

for(let i=0;i<NG;i++){
  const angle=(i/NG)*Math.PI*2-Math.PI/2;
  const jitter=(Math.random()-0.5)*18;
  nodes.push({x:cx+Math.cos(angle)*(innerR+jitter),y:cy+Math.sin(angle)*(innerR+jitter),type:'goalie',r:1.5+Math.random()*3,count:10+Math.floor(Math.random()*200)});
}
for(let i=0;i<NS;i++){
  const angle=(i/NS)*Math.PI*2-Math.PI/2;
  const jitter=(Math.random()-0.5)*35;
  nodes.push({x:cx+Math.cos(angle)*(outerR+jitter),y:cy+Math.sin(angle)*(outerR+jitter),type:'scorer',r:0.8+Math.random()*2.5,count:5+Math.floor(Math.random()*150)});
}
for(let i=NG;i<NG+NS;i++){
  const numE=2+Math.floor(Math.random()*4);
  for(let j=0;j<numE;j++) edges.push([i,Math.floor(Math.random()*NG)]);
}
const maxDist=outerR*2;
const edgeDists=edges.map(([a,b])=>{const dx=nodes[a].x-nodes[b].x,dy=nodes[a].y-nodes[b].y;return Math.sqrt(dx*dx+dy*dy);});

function draw(){
  X.fillStyle='#090e16';X.fillRect(0,0,W,H);

  // Soft glow pass — accumulates in dense zones
  X.lineWidth=3.5;
  for(let e=0;e<edges.length;e++){
    const[a,b]=edges[e];
    const na=nodes[a],nb=nodes[b];
    const closeness=1-Math.min(edgeDists[e]/maxDist,1);
    const alpha=0.008+closeness*0.018;
    const midX=(na.x+nb.x)/2,midY=(na.y+nb.y)/2;
    const cpx=midX+(cx-midX)*0.3,cpy=midY+(cy-midY)*0.3;

    const grad=X.createLinearGradient(na.x,na.y,nb.x,nb.y);
    grad.addColorStop(0,`rgba(80,170,210,${alpha})`);
    grad.addColorStop(1,`rgba(230,150,85,${alpha})`);
    X.globalAlpha=1;X.strokeStyle=grad;
    X.beginPath();X.moveTo(na.x,na.y);X.quadraticCurveTo(cpx,cpy,nb.x,nb.y);X.stroke();
  }

  // Sharp gradient core
  X.lineWidth=0.5;
  for(let e=0;e<edges.length;e++){
    const[a,b]=edges[e];
    const na=nodes[a],nb=nodes[b];
    const closeness=1-Math.min(edgeDists[e]/maxDist,1);
    const alpha=0.06+closeness*0.19;
    const midX=(na.x+nb.x)/2,midY=(na.y+nb.y)/2;
    const cpx=midX+(cx-midX)*0.3,cpy=midY+(cy-midY)*0.3;

    const grad=X.createLinearGradient(na.x,na.y,nb.x,nb.y);
    grad.addColorStop(0,`rgba(90,180,205,${alpha})`);
    grad.addColorStop(1,`rgba(230,150,85,${alpha})`);
    X.globalAlpha=1;X.strokeStyle=grad;
    X.beginPath();X.moveTo(na.x,na.y);X.quadraticCurveTo(cpx,cpy,nb.x,nb.y);X.stroke();
  }

  // Nodes
  for(const n of nodes){
    const br=0.5+0.5*(n.count/200);
    const g=X.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*4);
    const c=n.type==='scorer'?'90,180,205':'230,155,90';
    g.addColorStop(0,`rgba(${c},${br*0.25})`);g.addColorStop(1,`rgba(${c},0)`);
    X.globalAlpha=1;X.fillStyle=g;
    X.beginPath();X.arc(n.x,n.y,n.r*4,0,Math.PI*2);X.fill();

    X.globalAlpha=br;
    X.fillStyle=n.type==='scorer'?'#5cc0d8':'#e89858';
    X.beginPath();X.arc(n.x,n.y,n.r,0,Math.PI*2);X.fill();
  }
}
draw();
</script></body></html>
