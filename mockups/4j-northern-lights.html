<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>4J: Northern Lights</title>
<style>*{margin:0;padding:0}body{background:#060a10;overflow:hidden}canvas{display:block}
#label{position:fixed;top:20px;left:20px;color:#c8d8e0;font:600 18px Inter,system-ui;opacity:.7}
#desc{position:fixed;top:50px;left:20px;color:#c8d8e0;font:13px Inter,system-ui;opacity:.35;max-width:420px;line-height:1.5}
</style></head><body>
<div id="label">4J / Northern Lights</div>
<div id="desc">Three color passes at different angles of the ring — teal, green, purple — creating an aurora/northern-lights effect. 30% sampled. Each color covers ~120° of the ring. Very atmospheric.</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=window.innerWidth,H=window.innerHeight;
C.width=W*2;C.height=H*2;C.style.width=W+'px';C.style.height=H+'px';
X.scale(2,2);
const cx=W/2,cy=H/2,R=Math.min(W,H);
const innerR=R*0.18,outerR=R*0.43;
const PHI=0.618033988749895;
const NG=120,NS=350;
const nodes=[];const edges=[];
function spread(n){const o=[];for(let i=0;i<n;i++){let s=Math.round((i*n*PHI)%n);while(o[s]!==undefined)s=(s+1)%n;o[s]=i;}return o;}
const gOrder=spread(NG),sOrder=spread(NS);
for(let i=0;i<NG;i++){const ai=(gOrder[i]/NG)*Math.PI*2;const j=(Math.random()-.5)*12;nodes.push({x:cx+Math.cos(ai)*(innerR+j),y:cy+Math.sin(ai)*(innerR+j),type:'g',r:1.5+Math.random()*3.5,c:10+Math.floor(Math.random()*200)});}
for(let i=0;i<NS;i++){const ai=(sOrder[i]/NS)*Math.PI*2;const j=(Math.random()-.5)*18;nodes.push({x:cx+Math.cos(ai)*(outerR+j),y:cy+Math.sin(ai)*(outerR+j),type:'s',r:0.8+Math.random()*2.5,c:5+Math.floor(Math.random()*150)});}
for(let i=NG;i<NG+NS;i++){const ne=1+Math.floor(Math.random()*4);for(let j=0;j<ne;j++)edges.push([i,Math.floor(Math.random()*NG)]);}
// Bucket edges by midpoint angle into 3 color zones
const zones=[[],[],[]];
const colors=['#40c8b0','#60b8d8','#a080c8'];
for(const[a,b]of edges){
  if(((a*2654435761)>>>0)%100>=30)continue; // 30% sample
  const mx=(nodes[a].x+nodes[b].x)/2-cx,my=(nodes[a].y+nodes[b].y)/2-cy;
  const ang=((Math.atan2(my,mx)+Math.PI)/(Math.PI*2)*3)|0;
  zones[Math.min(2,ang)].push([a,b]);
}
function draw(){
X.fillStyle='#060a10';X.fillRect(0,0,W,H);
for(let z=0;z<3;z++){
  X.globalAlpha=0.045;X.strokeStyle=colors[z];X.lineWidth=0.3;
  X.beginPath();for(const[a,b]of zones[z]){X.moveTo(nodes[a].x,nodes[a].y);X.lineTo(nodes[b].x,nodes[b].y);}X.stroke();
}
for(const n of nodes){const br=0.55+0.45*Math.min(n.c/200,1);X.globalAlpha=br;X.fillStyle=n.type==='s'?'#5cc0d8':'#e89858';X.beginPath();X.arc(n.x,n.y,n.r,0,Math.PI*2);X.fill();}
}draw();
</script></body></html>
